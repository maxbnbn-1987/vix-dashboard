# .github/workflows/dashboard.yml
# 波動作戰盤 — 產出 docs/index.html 供 GitHub Pages
name: vix-dashboard

on:
  schedule:
    # ⚠️ GitHub 內建 cron 常延遲數分鐘~數十分鐘, 尖峰時甚至整段漏跑; 這裡僅當「備援」。
    #    要準時, 請用 cron-job.org 定時打下方 repository_dispatch (見檔尾說明)。
    # GitHub cron 為 UTC。台股盤中 09:00-13:45 (UTC+8) = 01:00-05:45 UTC
    - cron: "*/10 1-5 * * 1-5"
    # 美股盤中約 21:30-04:00 (UTC+8, 夏令) = 13:30-20:00 UTC
    - cron: "*/15 13-20 * * 1-5"
  workflow_dispatch: {}          # 手動 Run workflow
  repository_dispatch:           # 外部 (cron-job.org) 觸發: event_type = "refresh"
    types: [refresh]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install yfinance requests
      - name: Build dashboard
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}       # 台指近月(含夜盤)需要
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # 觸發批次時想推 Telegram 就把下行改成 --telegram
        run: python market_dashboard.py --out docs/index.html
      - name: Commit & push
        run: |
          git config user.name "dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "dashboard: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push

# --------------------------------------------------------------------------
# cron-job.org 準時觸發設定 (取代不可靠的 GitHub 內建 cron):
#   URL     : https://api.github.com/repos/maxbnbn-1987/vix-dashboard/dispatches
#   Method  : POST
#   Headers :
#     Accept: application/vnd.github+json
#     Authorization: Bearer <你的 GitHub PAT, 需 repo 權限>
#     X-GitHub-Api-Version: 2022-11-28
#   Body    : {"event_type":"refresh"}
#   排程    : 台股 09:00-13:30 每10分、美股時段每15分 (cron-job.org 設台北時區即可)
# --------------------------------------------------------------------------
